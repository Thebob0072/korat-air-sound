version: '3.8'

services:
  # ── Local MySQL (ใช้แทน Cloud SQL ตอน dev) ────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: korat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: korat_pass
      MYSQL_DATABASE: korat_air_sound
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-pkorat_pass']
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: korat_backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      # ใช้ local MySQL (เปลี่ยนเป็น Cloud SQL URL ได้ถ้าต้องการ)
      DATABASE_URL: mysql://root:korat_pass@mysql:3306/korat_air_sound
      NODE_ENV: development
    depends_on:
      mysql:
        condition: service_healthy

  # ── Frontend ───────────────────────────────────────────────────────────────
  # หมายเหตุ: frontend นี้ build static แล้วเสิร์ฟด้วย nginx (production mode)
  # ถ้าต้องการ dev mode ที่มี hot-reload ให้รัน: cd frontend && npm run dev
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: korat_frontend
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - backend

volumes:
  mysql_data:
