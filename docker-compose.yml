version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: korat_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: korat_root_pass
      MYSQL_USER: korat_user
      MYSQL_PASSWORD: korat_pass
      MYSQL_DATABASE: korat_air_sound
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./backend
    container_name: korat_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://korat_user:korat_pass@mysql:3306/korat_air_sound
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: korat_frontend
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - backend

volumes:
  mysql_data:
